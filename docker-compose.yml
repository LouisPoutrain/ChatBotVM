version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: univ-qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./TestExtraction/qdrant_data:/qdrant/storage
    restart: unless-stopped

  chatbot-api:
    build: .
    container_name: univ-chatbot
    ports:
      - "8600:8600"
    volumes:
      # Montage des volumes pour la persistance des données
      - ./Log:/app/Log
      - ./RAC/Data:/app/RAC/Data
      - ./data:/app/data
      - ./PDF2:/app/PDF2
    restart: unless-stopped
    depends_on:
      - qdrant
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - QDRANT_URL=http://qdrant:6333
